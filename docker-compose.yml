version: '3.8'

services:
  gestionale:
    build: .
    container_name: tango-gestionale
    restart: unless-stopped
    environment:
      SESSION_KEY: ${SESSION_KEY:-cambia-questa-chiave}
      DB_PATH: /app/data/gestionale.db
      PDF_PATH: /app/data/pdf
      # Magic-link login
      APP_URL: ${APP_URL:-https://tb.gcoding.it}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@tangobar.local}
      # SMTP — Brevo (smtp-relay.brevo.com)
      # Credenziali: Brevo → Settings → SMTP & API → SMTP
      # SMTP_USER = email account Brevo
      # SMTP_PASS = chiave SMTP generata dalla dashboard
      # Popolare SMTP_USER e SMTP_PASS in un file .env locale (non committare mai)
      SMTP_HOST: ${SMTP_HOST:-smtp-relay.brevo.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@tb.gcoding.it}
      MAIL_LOGIN_SUBJECT: ${MAIL_LOGIN_SUBJECT:-TangoBar · Accesso}
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:8090:8080"
